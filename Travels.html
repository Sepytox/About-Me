  <link rel="stylesheet" href="style.css"/>
  <style>
    /* MAP */
    #map-section{background:var(--bg);}
    .map-layout{display:grid;grid-template-columns:1fr 280px;gap:2.5rem;align-items:start;}
    .map-wrap{border:1px solid var(--border);background:var(--bg2);position:relative;overflow:hidden;}
    #worldMap{width:100%;height:auto;display:block;}
    #worldMap path{fill:#1a2a3a;stroke:#0a0e16;stroke-width:0.4;transition:fill 0.3s;cursor:pointer;}
    #worldMap path.visited{fill:var(--accent3);filter:drop-shadow(0 0 4px rgba(127,255,110,0.4));}
    #worldMap path:hover{fill:var(--accent);}
    .map-tooltip{position:absolute;background:var(--bg3);border:1px solid var(--border);padding:0.4rem 0.9rem;font-family:'Share Tech Mono',monospace;font-size:0.68rem;color:var(--accent);pointer-events:none;display:none;z-index:10;letter-spacing:0.1em;white-space:nowrap;}
    .map-legend{display:flex;gap:1.5rem;padding:1rem 1.5rem;border-top:1px solid var(--border);}
    .leg-item{display:flex;align-items:center;gap:0.5rem;font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--muted);}
    .leg-dot{width:10px;height:10px;border-radius:2px;}

    /* SIDEBAR */
    .country-sidebar h3{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);margin-bottom:1rem;padding-bottom:0.6rem;border-bottom:1px solid var(--border);}
    .clist{list-style:none;display:flex;flex-direction:column;gap:3px;max-height:420px;overflow-y:auto;padding-right:4px;}
    .clist::-webkit-scrollbar{width:2px;}.clist::-webkit-scrollbar-thumb{background:var(--muted);}
    .citem{display:flex;align-items:center;gap:0.6rem;padding:0.45rem 0.7rem;border:1px solid transparent;transition:border-color 0.2s,background 0.2s;font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--text);letter-spacing:0.04em;cursor:default;}
    .citem:hover{border-color:var(--border);background:rgba(0,229,255,0.04);}
    .ccount{margin-top:1.2rem;padding:1.2rem;background:var(--bg);border:1px solid var(--border);text-align:center;}
    .ccount .big{font-family:'Rajdhani',sans-serif;font-size:3rem;font-weight:700;color:var(--accent3);line-height:1;}
    .ccount .sm{font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:var(--muted);letter-spacing:0.15em;margin-top:0.3rem;}

    @media(max-width:900px){
      .map-layout{grid-template-columns:1fr;}
    }
  </style>
</head>

<script>
// ══════════════════════════════════════════
// VISITED COUNTRIES — hier Länder eintragen!
// id = SVG Pfad ID oben, name = Anzeigename, flag = Emoji
// ══════════════════════════════════════════
const visited = [
  { id:'CH', name:'Schweiz',     flag:'🇨🇭' },
  { id:'DE', name:'Deutschland', flag:'🇩🇪' },
  { id:'AT', name:'Österreich',  flag:'🇦🇹' },
  { id:'IT', name:'Italien',     flag:'🇮🇹' },
  { id:'FR', name:'Frankreich',  flag:'🇫🇷' },
  // ── Weitere Länder hier einfügen ──
  // { id:'ES', name:'Spanien',        flag:'🇪🇸' },
  // { id:'PT', name:'Portugal',       flag:'🇵🇹' },
  // { id:'GR', name:'Griechenland',   flag:'🇬🇷' },
  // { id:'HR', name:'Kroatien',       flag:'🇭🇷' },
  // { id:'TR', name:'Türkei',         flag:'🇹🇷' },
  // { id:'US', name:'USA',            flag:'🇺🇸' },
  // { id:'JP', name:'Japan',          flag:'🇯🇵' },
  // { id:'TH', name:'Thailand',       flag:'🇹🇭' },
  // { id:'MA', name:'Marokko',        flag:'🇲🇦' },
  // { id:'AE', name:'VAE',            flag:'🇦🇪' },
  // { id:'AU', name:'Australien',     flag:'🇦🇺' },
];

// Mark visited
visited.forEach(c => {
  const el = document.getElementById(c.id);
  if (el) el.classList.add('visited');
});

// Sidebar
const list = document.getElementById('countryList');
visited.forEach(c => {
  const li = document.createElement('li');
  li.className = 'citem';
  li.innerHTML = `<span>${c.flag}</span><span>${c.name}</span>`;
  li.addEventListener('mouseenter', () => { const el = document.getElementById(c.id); if (el) el.style.fill = 'var(--accent)'; });
  li.addEventListener('mouseleave', () => { const el = document.getElementById(c.id); if (el) el.style.fill = ''; });
  list.appendChild(li);
});
document.getElementById('countNum').textContent = visited.length;

// Tooltip
const tooltip = document.getElementById('tooltip');
const mapWrap  = document.querySelector('.map-wrap');
document.querySelectorAll('#worldMap path').forEach(p => {
  p.addEventListener('mousemove', e => {
    const r = mapWrap.getBoundingClientRect();
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX - r.left + 12) + 'px';
    tooltip.style.top  = (e.clientY - r.top  + 12) + 'px';
    tooltip.textContent = p.dataset.name || p.id;
  });
  p.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
});

// Scroll reveal
document.querySelectorAll('.reveal').forEach(r=>{new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible');});},{threshold:0.1}).observe(r);});
</script>
